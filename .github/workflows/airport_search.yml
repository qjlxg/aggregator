name: airport_search

on:
  push:
    paths:
      - 'airport_search.py'
      - '.github/workflows/airport_search.yml'
  workflow_dispatch:
  schedule:
    # 每 6 小时运行一次 (UTC 时间: 18:00, 00:00, 06:00, 12:00)
    # 对应北京时间: 02:00, 08:00, 14:00, 20:00
    - cron: '0 */6 * * *'

# 授予推送代码的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 必须检出完整历史以便推送
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz urllib3

      - name: Run Search Script
        env:
          # 使用你在 Secrets 中保存的 BOT Token
          BOT: ${{ secrets.BOT }}
          TZ: Asia/Shanghai
        run: python airport_search.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查文件是否有变化
          git add results.txt
          if git diff --staged --quiet; then
            echo "No changes in results.txt, skipping push."
          else
            git commit -m "chore: 自动更新机场试用列表 ($(date +'%Y-%m-%d %H:%M:%S'))"
            git push
          fi
