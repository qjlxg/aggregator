name: search_and_save

on:
  push:
    paths:
      - 'search_and_save.py'
      - '.github/workflows/search_and_save.yml'
  workflow_dispatch: # 支持手动运行按钮

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai # 设置上海时区

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 使用你设置的名为 BOT 的 Secret (建议是 PAT)
          token: ${{ secrets.BOT }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 运行去重脚本
        run: python search_and_save.py

      - name: 提交并推送更改
        run: |
          # 配置机器人身份
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有内容变更
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: 🤖 自动更新域名列表 [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push
          else
            echo "没有发现文件变动，跳过推送。"
          fi
