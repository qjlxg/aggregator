name: URLScan Asset Scraper

on:
  push:
    # 只有当以下文件变动时才触发，避免无关文件（如 results.txt）变动导致死循环
    paths:
      - 'urlscan_scraper.py'
      - '.github/workflows/urlscan.yml'
    branches:
      - main  # 或者你的默认分支名（如 master）
  schedule:
    - cron: '0 */8 * * *' 
  workflow_dispatch: # 保留手动触发按钮

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Requests
        run: pip install requests

      - name: Run URLScan Scraper
        run: python urlscan_scraper.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "URLScan-Bot"
          git add urlscan_results.txt
          # 检查是否有新扫描到的资产，如果有则提交
          if [ -n "$(git status --porcelain urlscan_results.txt)" ]; then
            git commit -m "Update assets from urlscan [skip ci]"
            git push
          else
            echo "No new assets found, skipping commit."
          fi
