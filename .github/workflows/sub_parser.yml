name: sub_parser

on:
  workflow_dispatch:
  push:
    paths:
      - 'sub_parser.py'
      - '.github/workflows/sub_parser.yml'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Deps
        run: pip install requests maxminddb

      - name: Execute
        env:
          LINK: ${{ vars.LINK }}
          TZ: Asia/Shanghai
        run: python sub_parser.py

      - name: Push
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "NodeParserBot"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update nodes: $(date +'%Y-%m-%d %H:%M')" && git push)
