name: onyphe_collector

on:
  push:
    paths:
      - 'onyphe_collector.py'
      - '.github/workflows/onyphe_collector.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  run_task:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Environment
        run: |
          pip install playwright
          playwright install chromium

      - name: Execute Scraper
        env:
          TZ: Asia/Shanghai
        run: python onyphe_collector.py

      - name: Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查是否有结果或错误截图
          git add onyphe_results.txt || true
          git add error.png || true
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update from ONYPHE (including logs/errors)" && git push)
