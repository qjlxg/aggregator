name: jichang_list

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *' # 每天北京时间 11:00
  push:
    paths:
      - 'jichang_list.py'
      - '.github/workflows/jichang_list.yml'

jobs:
  run_scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: pip install requests

      - name: 执行采集
        env:
          TZ: Asia/Shanghai
        run: python jichang_list.py

      - name: 推送数据
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
          
          git add trial.cfg
          if ! git diff --cached --exit-code; then
            git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git pull origin main --rebase
            git push origin main
          else
            echo "没有新域名发现。"
          fi
