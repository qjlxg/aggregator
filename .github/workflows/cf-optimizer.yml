name: IP Optimizer

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests
      - run: python3 cf-optimizer.py
      
      - name: Save to Repo
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add candidate_ips.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update IPs" && git push)
