name: CF Optimizer Pipeline

on:
  push:
  workflow_dispatch:

permissions: {contents: write}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Subscription
        run: |
          # 1. 运行你的测速脚本，确保它生成 candidate_ips.txt
          python3 cf-optimizer.py
          
          # 2. 拼接节点字符串
          sub_content=""
          while read -r IP; do
            if [ -n "$IP" ]; then
              # 使用你确认过能用的精准模板
              LINK="vless://82d277fb-db97-4daf-a071-c88a10e4393e@$IP:80?type=ws&host=and.qjlxg.workers.dev&path=/7ed=2560#CF-优选-$IP"
              sub_content+="$LINK\n"
            fi
          done < candidate_ips.txt
          
          # 3. 如果 sub_content 不为空，进行 base64 编码并保存
          if [ -n "$sub_content" ]; then
            echo -n -e "$sub_content" | base64 > sub.yaml
          else
            echo "Error: No IPs found!"
            exit 1
          fi

      - name: Deploy to gh-pages
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # 创建或切换到 gh-pages 分支
          git checkout -B gh-pages
          # 强制将 sub.yaml 移动到根目录（因为 Pages 通常读根目录）
          git add -f sub.yaml
          git commit -m "Update subscription $(date +'%Y-%m-%d')"
          git push origin gh-pages --force
