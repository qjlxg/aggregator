name: Cloudflare IP Optimizer & Sync

on:
  push:
    branches:
      - main
    paths:
      - 'cf-optimizer.py'
      - '.github/workflows/cf-optimizer.yml'
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloudflare-optimizer
  cancel-in-progress: true

jobs:
  filter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch and Filter IPs
        timeout-minutes: 5
        run: |
          set -e
          python3 script.py 
          
          if [ ! -f candidate_ips.txt ]; then
            echo "Error: candidate_ips.txt not generated"
            exit 1
          fi

          mkdir -p results/history
          cp candidate_ips.txt results/latest.txt
          # 强制指定北京时间生成历史文件名
          cp candidate_ips.txt results/history/$(TZ=Asia/Shanghai date +'%Y-%m-%d').txt
          find results/history -type f -mtime +90 -delete

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git add -- results/
          
          if git diff --cached --quiet; then
            echo 'No changes detected.'
          else
            git commit -m "Update results [skip ci]"
            git push
          fi

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optimizer-data
          path: results/
          if-no-files-found: warn
