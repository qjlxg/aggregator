name: CF Optimizer Pipeline

on:
  schedule:
    - cron: '0 16 * * *'
  push:
    paths-ignore: ['sub.yaml', 'candidate_ips.txt']
  workflow_dispatch:

permissions: {contents: write}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Subscription
        run: |
          python3 cf-optimizer.py
          
          sub_links=""
          while read -r IP; do
            if [ -n "$IP" ]; then
              LINK="vless://82d277fb-db97-4daf-a071-c88a10e4393e@$IP:80?type=ws&host=and.qjlxg.workers.dev&path=/7ed=2560#CF-优选-$IP"
              sub_links+="$LINK\n"
            fi
          done < candidate_ips.txt
          
          printf "$sub_links" | base64 > sub.yaml

      - name: Deploy to gh-pages
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b gh-pages
          git add sub.yaml candidate_ips.txt
          git commit -m "Update subscription $(date +'%Y-%m-%d')"
          git push origin gh-pages --force
