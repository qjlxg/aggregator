name: CF Optimizer Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - run: pip install requests httpx

      - name: Generate Subscription
        env:
          TEMPLATE: ${{ secrets.VLESS_LINK_TEMPLATE }}
        run: |
          python3 cf-optimizer.py
          sub_content=""
          while read -r IP; do
            if [ -n "$IP" ]; then
              LINK=$(echo "$TEMPLATE" | sed "s/IP_PLACEHOLDER/$IP/g")
              sub_content+="$LINK\n"
            fi
          done < candidate_ips.txt
          echo -n -e "$sub_content" | base64 -w 0 > sub.txt

      - name: Push to Private Repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/qjlxg/362.git private_repo
          cp sub.txt candidate_ips.txt private_repo/
          cd private_repo
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add sub.txt candidate_ips.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update subscription $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
            echo "同步成功"
          else
            echo "内容未变化，无需更新"
          fi
