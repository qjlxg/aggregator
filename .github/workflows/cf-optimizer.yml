name: Cloudflare IP Optimizer & Sync

on:
  push:
    branches:
      - main
    paths:
      - 'cf-optimizer.py'
      - '.github/workflows/cf-optimizer.yml'
    # 彻底解决 CI 循环风暴：忽略结果目录的变动
    paths-ignore:
      - 'results/**'
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloudflare-optimizer
  cancel-in-progress: true

jobs:
  filter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # 开启 pip 缓存

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Fetch and Filter IPs
        timeout-minutes: 5
        run: |
          set -e
          python3 cf-optimizer.py 
          
          if [ ! -f candidate_ips.txt ]; then
            echo "Error: candidate_ips.txt not generated"
            exit 1
          fi

          mkdir -p results/history
          cp candidate_ips.txt results/latest.txt
          cp candidate_ips.txt results/history/$(TZ=Asia/Shanghai date +'%Y-%m-%d').txt
          
          # 修正历史文件清理逻辑：只保留最近 90 个文件，不受文件 mtime 影响
          ls -t results/history/* 2>/dev/null | tail -n +91 | xargs -r rm -f

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git add -- results/
          
          if git diff --cached --quiet; then
            echo 'No changes detected.'
          else
            git commit -m "Update results [skip ci]"
            git push
          fi

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optimizer-data
          path: results/
          if-no-files-found: warn
