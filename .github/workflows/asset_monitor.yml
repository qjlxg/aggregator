name: Auto Asset Monitor

on:
  schedule:
    - cron: '0 2 * * *' 
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/asset_monitor.yml'
      - 'targets.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ASSUME_NO_MOVING_GC_UNSAFE_RISK_IT_WITH: go1.22

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Metabigor
        run: |
          git clone https://github.com/j3ssie/metabigor.git
          cd metabigor
          go build -o metabigor cmd/metabigor/main.go
          sudo mv metabigor /usr/local/bin/
          cd ..

      - name: Prepare Targets
        run: |
          if [ ! -f targets.txt ]; then echo "v2board" > targets.txt; fi
          sed -i 's/\r$//' targets.txt

      - name: Run Search and Collect
        run: |
          mkdir -p results
          DATE_STR=$(date +%F)
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" == "#"* ]] && continue
            echo "Searching: $line"
            # 增加延迟并尝试搜索
            echo "$line" | metabigor github --json >> "results/raw_${DATE_STR}.json"
            sleep 5
          done < targets.txt

      - name: Extract Clean Assets (Python)
        run: |
          python3 -c "
          import json, os
          from datetime import datetime
          date_str = datetime.now().strftime('%Y-%m-%d')
          raw_file = f'results/raw_{date_str}.json'
          out_file = 'results/cleaned_repos.txt'
          if not os.path.exists(raw_file): exit(0)
          
          repos = set()
          with open(raw_file, 'r') as f:
              for line in f:
                  try:
                      # 兼容有些版本输出多行JSON的情况
                      data = json.loads(line)
                      if 'hits' in data:
                          for hit in data['hits']:
                              name = hit.get('repo', {}).get('raw')
                              if name: repos.add(f'https://github.com/{name}')
                  except: continue
          
          with open(out_file, 'w') as f:
              f.write('\n'.join(sorted(repos)))
          print(f'Done! Extracted {len(repos)} unique repos.')
          "

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results/
          git commit -m "Asset Update: $(date +%F)" || exit 0
          git push
