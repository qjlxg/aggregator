name: Auto Asset Monitor

on:
  schedule:
    - cron: '0 2 * * *' 
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/asset_monitor.yml'
      - 'targets.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ASSUME_NO_MOVING_GC_UNSAFE_RISK_IT_WITH: go1.22

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Metabigor from Source
        run: |
          git clone https://github.com/j3ssie/metabigor.git
          cd metabigor
          # 修正点：进入 cmd 目录编译，或者直接指向路径
          go build -o metabigor cmd/metabigor/main.go
          sudo mv metabigor /usr/local/bin/
          cd ..
          # 验证是否安装成功及命令是否存在
          metabigor --help

      - name: Prepare Targets
        run: |
          if [ ! -f targets.txt ]; then
            echo "targets.txt not found"
            exit 1
          fi
          sed -i 's/\r$//' targets.txt

      - name: Run Search and Collect
        run: |
          mkdir -p results
          DATE_STR=$(date +%F)
          
          echo "Starting GitHub search..."
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" == "#"* ]] && continue
            
            echo "Searching: $line"
            # 尝试使用新版的直接输入方式
            echo "$line" | metabigor github --json >> "results/raw_${DATE_STR}.json"
            
            sleep 5
          done < targets.txt

      - name: Post-process Results
        run: |
          DATE_STR=$(date +%F)
          if [ -f "results/raw_${DATE_STR}.json" ]; then
            sort -u "results/raw_${DATE_STR}.json" -o "results/assets_latest.json"
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results/
          git commit -m "Asset Update: $(date +%F)" || exit 0
          git push
