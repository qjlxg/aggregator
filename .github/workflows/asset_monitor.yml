name: Auto Asset Monitor

on:
  schedule:
    - cron: '0 2 * * *' 
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/asset_monitor.yml'
      - 'targets.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ASSUME_NO_MOVING_GC_UNSAFE_RISK_IT_WITH: go1.22

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Metabigor
        run: |
          git clone https://github.com/j3ssie/metabigor.git
          cd metabigor
          go build -o metabigor cmd/metabigor/main.go
          sudo mv metabigor /usr/local/bin/
          cd ..

      - name: Run Search and Collect
        run: |
          mkdir -p results
          DATE_STR=$(date +%F)
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" == "#"* ]] && continue
            echo "Searching: $line"
            # 关键改动：添加 --regex false 强制关闭正则模式，确保路径匹配成功
            echo "$line" | metabigor github --json --regex false >> "results/raw_${DATE_STR}.json"
            sleep 5
          done < targets.txt

      - name: Python Intelligence Extraction
        run: |
          python3 -c "
          import json, os, re
          from datetime import datetime
          
          date_str = datetime.now().strftime('%Y-%m-%d')
          raw_file = f'results/raw_{date_str}.json'
          repo_file = 'results/found_repos.txt'
          domain_file = 'results/found_domains.txt'
          
          if not os.path.exists(raw_file): exit(0)
          
          repos = set()
          domains = set()
          # 匹配域名/URL 的简单正则
          url_pattern = re.compile(r'https?://[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}')
          
          with open(raw_file, 'r') as f:
              for line in f:
                  try:
                      data = json.loads(line)
                      if 'hits' in data:
                          for hit in data['hits']:
                              # 提取 GitHub 仓库
                              repo_name = hit.get('repo', {}).get('raw')
                              if repo_name: repos.add(f'https://github.com/{repo_name}')
                              
                              # 提取代码片段里的 URL
                              content = str(hit.get('content', {}).get('raw', ''))
                              found_urls = url_pattern.findall(content)
                              for u in found_urls:
                                  # 过滤掉常见的无用域名
                                  if 'github.com' not in u and 'schema.org' not in u:
                                      domains.add(u)
                  except: continue
          
          with open(repo_file, 'w') as f: f.write('\n'.join(sorted(repos)))
          with open(domain_file, 'w') as f: f.write('\n'.join(sorted(domains)))
          print(f'Done! Found {len(repos)} repos and {len(domains)} potential endpoints.')
          "

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results/
          git commit -m "Auto Recon: $(date +%F)" || exit 0
          git push
