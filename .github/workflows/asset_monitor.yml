name: Auto Asset Monitor

on:
  schedule:
    - cron: '0 2 * * *' 
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/asset_monitor.yml'
      - 'targets.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    # 环境变量保留，以防万一
    env:
      ASSUME_NO_MOVING_GC_UNSAFE_RISK_IT_WITH: go1.22

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Metabigor from Release
        run: |
          # 1. 下载 v2.1.0 的 Linux 64位版本
          wget https://github.com/j3ssie/metabigor/releases/download/v2.1.0/metabigor_v2.1.0_linux_amd64.tar.gz
          
          # 2. 解压
          tar -xvf metabigor_v2.1.0_linux_amd64.tar.gz
          
          # 3. 移动到可执行路径并赋予权限
          sudo mv metabigor /usr/local/bin/
          chmod +x /usr/local/bin/metabigor
          
          # 4. 验证安装
          metabigor --version
          metabigor --help

      - name: Prepare Targets
        run: |
          if [ ! -f targets.txt ]; then
            echo "targets.txt missing"
            exit 1
          fi
          sed -i 's/\r$//' targets.txt

      - name: Run Search and Collect
        run: |
          mkdir -p results
          DATE_STR=$(date +%F)
          
          echo "Scanning GitHub using v2.1.0 Release..."
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" == "#"* ]] && continue
            
            echo "Searching keyword: $line"
            # v2.1.0 依然支持 pipe 语法
            echo "$line" | metabigor github --json >> "results/raw_${DATE_STR}.json"
            
            # 5秒间隔防止被 grep.app 封禁
            sleep 5
          done < targets.txt

      - name: Post-process Results
        run: |
          DATE_STR=$(date +%F)
          if [ -f "results/raw_${DATE_STR}.json" ]; then
            sort -u "results/raw_${DATE_STR}.json" -o "results/assets_latest.json"
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results/
          git commit -m "Asset Update v2.1.0: $(date +%F)" || exit 0
          git push
