name: Auto Asset Monitor

on:
  schedule:
    - cron: '0 2 * * *' 
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/asset_monitor.yml'
      - 'targets.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # 维持兼容性环境变量
      ASSUME_NO_MOVING_GC_UNSAFE_RISK_IT_WITH: go1.22

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Metabigor (Stable Version)
        run: |
          # 强制安装 v1.10.0 稳定版，确保 github 命令可用
          go install github.com/j3ssie/metabigor@v1.10.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Prepare Targets
        run: |
          if [ ! -f targets.txt ]; then
            echo "targets.txt missing"
            exit 1
          fi
          sed -i 's/\r$//' targets.txt

      - name: Run Search and Collect
        run: |
          mkdir -p results
          DATE_STR=$(date +%Y-%m-%d)
          
          echo "Scanning via Metabigor v1.10.0..."
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" == "#"* ]] && continue
            
            echo "Searching: $line"
            # v1.x 版本的标准用法
            echo "$line" | metabigor github --json >> "results/raw_${DATE_STR}.json"
            
            sleep 5
          done < targets.txt

      - name: Post-process Results
        run: |
          DATE_STR=$(date +%Y-%m-%d)
          if [ -f "results/raw_${DATE_STR}.json" ]; then
            sort -u "results/raw_${DATE_STR}.json" -o "results/assets_latest.json"
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results/
          git commit -m "Auto-update assets: $(date +%Y-%m-%d)" || exit 0
          git push
