name: Auto Asset Monitor

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/asset_monitor.yml'
      - 'targets.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ASSUME_NO_MOVING_GC_UNSAFE_RISK_IT_WITH: go1.22

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Metabigor
        run: |
          go install github.com/j3ssie/metabigor@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

     

      - name: Prepare Targets
        run: |
          if [ ! -f targets.txt ]; then
            echo "错误：请在仓库根目录创建 targets.txt"
            exit 1
          fi
          # 清洗可能存在的 Windows 换行符
          sed -i 's/\r$//' targets.txt

      - name: Run Search and Collect
        run: |
          mkdir -p results
          DATE_STR=$(date +%Y-%m-%d)
          
          echo "开始搜索任务..."
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" == "#"* ]] && continue
            
            echo "正在搜索关键词: $line"
            # github 模块抓取结果
            echo "$line" | metabigor github --json >> "results/raw_${DATE_STR}.json"
            
            # 增加延迟保护，防止被 grep.app 封锁
            sleep 5
          done < targets.txt

      - name: Post-process Results
        run: |
          DATE_STR=$(date +%Y-%m-%d)
          RAW_FILE="results/raw_${DATE_STR}.json"
          FINAL_FILE="results/assets_latest.json"
          
          if [ -f "$RAW_FILE" ]; then
            sort -u "$RAW_FILE" -o "$FINAL_FILE"
            echo "结果已保存至 $FINAL_FILE"
          else
            echo "未发现新资产"
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results/
          git commit -m "自动更新资产列表: $(date +%Y-%m-%d)" || exit 0
          git push
