port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
ipv6: false
external-controller: :9090
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - 119.29.29.29
  - 223.5.5.5
  fallback:
  - 8.8.8.8
  - 8.8.4.4
  - tls://1.0.0.1:853
  - tls://dns.google:853
proxy-providers:
  free-nodes:
    type: http
    url: https://raw.githubusercontent.com/qjlxg/aggregator/refs/heads/main/data/nodes.txt
    interval: 3600
    path: ./proxies/free.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
proxy-groups:
- name: 🚀 节点选择
  type: select
  proxies:
  - ⚡ 自动测速
  - DIRECT
  use:
  - free-nodes
- name: ⚡ 自动测速
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  use:
  - free-nodes
rules:
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,🚀 节点选择
